name: Service Pipeline

on:
  workflow_dispatch:

jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Deploy to staging"
        run: echo "Deploying the service..."

  smoke:
    needs: deploy
    name: "Test | Smoke"
    uses: ukk0/fake-ta-pipeline/.github/workflows/external-pytest-job.yml@main
    with:
      test-type: smoke

  integration:
    needs: smoke
    name: "Test | Integration"
    uses: ukk0/fake-ta-pipeline/.github/workflows/external-pytest-job.yml@main
    with:
      test-type: integration

  e2e:
    needs: integration
    name: "Test | E2E"
    uses: ukk0/fake-ta-pipeline/.github/workflows/external-pytest-job.yml@main
    with:
      test-type: e2e